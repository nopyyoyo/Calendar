<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Family Calendar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <h1 id="pageTitle">Family Calendar</h1>
      <div class="header-buttons">
        <button id="homeAddBtn" class="btn btn-primary" type="button">Add item</button>
        <button id="homeAddNoteBtn" class="btn btn-accent" type="button">Add Note</button>
      </div>
    </header>

    <main>
      <section id="calendarView" class="view">
        <div class="month-nav">
          <button id="prevMonthBtn" class="btn btn-ghost" type="button" aria-label="Previous month">&#9664;</button>
          <h2 id="monthLabel"></h2>
          <button id="nextMonthBtn" class="btn btn-ghost" type="button" aria-label="Next month">&#9654;</button>
        </div>

        <div class="filter-bar">
          <label for="personFilterSelect">Filter by person:</label>
          <select id="personFilterSelect" class="person-filter-select">
            <option value="">All person</option>
          </select>
        </div>

        <div class="weekday-row" id="weekdayRow"></div>
        <div id="calendarGrid" class="calendar-grid"></div>
      </section>

      <section id="notesIconsView" class="view notes-icons-section">
        <div class="notes-icons-container">
          <div id="notesIconsRow" class="notes-icons-row"></div>
        </div>
      </section>


      <section id="detailView" class="view hidden">
        <div class="card detail-card">
          <h2>Item Details</h2>
          <div class="detail-row"><span>Date</span><strong id="detailDate">-</strong></div>
          <div class="detail-row"><span>Date To</span><strong id="detailDateTo">-</strong></div>
          <div class="detail-row"><span>Time</span><strong id="detailTime">-</strong></div>
          <div class="detail-row"><span>Time To</span><strong id="detailTimeTo">-</strong></div>
          <div class="detail-row"><span>Item</span><strong id="detailItem">-</strong></div>
          <div class="detail-row"><span>Description</span><strong id="detailDescription">-</strong></div>
          <div class="detail-row"><span>Person</span><strong id="detailPerson">-</strong></div>
          <div class="detail-actions">
            <button id="detailEditBtn" class="btn btn-accent" type="button">Edit</button>
            <button id="detailDeleteBtn" class="btn btn-danger" type="button">Delete</button>
            <button id="backToCalendarBtn" class="btn btn-primary" type="button">Back to calendar</button>
          </div>
        </div>
      </section>

      <section id="dayListView" class="view hidden">
        <div class="card detail-card">
          <h2 id="dayListTitle">Items</h2>
          <div id="dayListBody" class="day-list-body"></div>
          <button id="dayListBackBtn" class="btn btn-primary" type="button">Back to calendar</button>
        </div>
      </section>

      <section id="formView" class="view hidden">
        <form id="itemForm" class="card form-card">
          <h2 id="formTitle">Add Family Item</h2>

          <div class="date-range-group">
            <div class="form-field">
              <label for="dateInput">Date From</label>
              <input id="dateInput" name="date" type="date" required />
            </div>
            <div class="form-field">
              <label for="dateToInput">Date To</label>
              <input id="dateToInput" name="dateTo" type="date" />
            </div>
          </div>

          <div class="time-range-group">
            <div class="form-field">
              <label for="timeInput">Time From</label>
              <input id="timeInput" name="time" type="time" />
            </div>
            <div class="form-field">
              <label for="timeToInput">Time To</label>
              <input id="timeToInput" name="timeTo" type="time" />
            </div>
          </div>

          <label for="itemInput">Item</label>
          <input id="itemInput" name="item" type="text" maxlength="80" placeholder="Birthday dinner" required />

          <label for="descriptionInput">Description</label>
          <textarea id="descriptionInput" name="description" rows="3" maxlength="280" placeholder="Where and what to prepare"></textarea>

          <label for="personInput">Person</label>
          <div id="personOptions" class="person-options" role="group" aria-label="Person"></div>

          <div class="form-actions">
            <button id="saveBackBtn" class="btn btn-primary" type="submit">Save and back to calendar</button>
            <button id="saveMoreBtn" class="btn btn-accent" type="button">Save and add more item</button>
            <button id="cancelFormBtn" class="btn btn-ghost" type="button">Cancel</button>
          </div>

          <p id="formMessage" class="form-message" aria-live="polite"></p>
        </form>
      </section>

      <section id="noteFormView" class="view hidden">
        <form id="noteForm" class="card form-card">
          <h2 id="noteFormTitle">Add Note</h2>

          <label for="noteNumberSelect">Note Number</label>
          <select id="noteNumberSelect" name="noteNumber" required>
            <option value="">Select Note (1-7)</option>
            <option value="1">Note 1</option>
            <option value="2">Note 2</option>
            <option value="3">Note 3</option>
            <option value="4">Note 4</option>
            <option value="5">Note 5</option>
            <option value="6">Note 6</option>
            <option value="7">Note 7</option>
          </select>

          <label for="noteTextInput">Note</label>
          <textarea id="noteTextInput" name="noteText" rows="8" placeholder="Enter your note here..."></textarea>

          <div class="form-actions">
            <button id="noteSaveBackBtn" class="btn btn-primary" type="submit">Save and back to calendar</button>
            <button id="noteSaveMoreBtn" class="btn btn-accent" type="button">Save and add more note</button>
            <button id="noteCancelFormBtn" class="btn btn-ghost" type="button">Cancel</button>
          </div>

          <p id="noteFormMessage" class="form-message" aria-live="polite"></p>
        </form>
      </section>

      <section id="noteDetailView" class="view hidden">
        <div class="card detail-card">
          <h2 id="noteDetailTitle">Note Details</h2>
          <div id="noteDetailContainer"></div>
          <div class="detail-actions">
            <button id="noteDetailEditBtn" class="btn btn-accent" type="button">Edit</button>
            <button id="noteDetailDeleteBtn" class="btn btn-danger" type="button">Delete</button>
            <button id="backToCalendarFromNoteBtn" class="btn btn-primary" type="button">Back to calendar</button>
          </div>
        </div>
      </section>

    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@1.35.7/dist/umd/supabase.min.js"></script>
  <script src="supabase-config.js"></script>
  <script src="app.js"></script>
</body>
</html>
